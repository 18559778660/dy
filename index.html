  <!-- 当前账户（优先从 localStorage 读取，否则用 account.json isCurrent） -->
  <script>
    (function () {
      var KEY = 'dy_conf_current_appid';

      function applyCurrentAccount(accounts) {
        if (!Array.isArray(accounts) || accounts.length === 0) return;

        // 优先从 localStorage 获取上次选择的账号
        var savedAppid = null;
        try {
          savedAppid = localStorage.getItem(KEY);
        } catch (e) { }

        var current;
        if (savedAppid) {
          // 用 localStorage 中保存的 appid 查找对应账号
          current = accounts.find(function (a) { return a.appid === savedAppid; });
        }
        // 如果没找到，回退到 isCurrent 或第一个账号
        if (!current) {
          current = accounts.find(function (a) { return a.isCurrent === true; }) || accounts[0];
          // 同步到 localStorage
          if (current && current.appid) {
            try {
              localStorage.setItem(KEY, current.appid);
            } catch (e) { }
          }
        }

        var img = document.getElementById('current-account-avatar');
        var title = document.getElementById('current-account-title');
        var appidEl = document.getElementById('current-account-appid');
        if (img && current.avatar) img.src = current.avatar;
        if (img && current.name) img.alt = current.name;
        if (title && current.name) title.textContent = current.name;
        if (appidEl && current.appid) appidEl.textContent = 'AppID:' + current.appid;
      }

      fetch('./account.json')
        .then(function (r) { return r.json(); })
        .then(applyCurrentAccount)
        .catch(function () { console.warn('无法加载 account.json'); });

      window.applyCurrentAccountHeader = applyCurrentAccount;
    })();
  </script>

                                        d="M146.52 110.94c-3.71 6.73-4.9 7.34-6.3 7.13-1.4-.2-2.14-4.66.84-6.29 1.09-.6 2.94-.84 5.46-.84Zm0 0c4.52-8.8 6.99-15.77 8.34-21.31m-8.34 21.31c1.56 0 3.75.03 6.07.06m-22.63 24.68c-7.87-.16-21.74.4-27.73-9.35a16.2 16.2 0 0 1-2.27-6.16m30 15.51c3.6 4.6 7.74 14.23 4.31 26.15-1.52 5.27-4.13 9.76-8.39 13.43m4.08-39.58c3.32.07 11.36.29 19.85.27m-40.95-46.5c-5.27 13.02-10.13 22.49-8.9 30.72m0 0c-1.3-.6-11.71-.98-17.74 1.34-4.9-1.34-31.24-13.22-31.13-29.1M39.92 178.3c.94-.32 42.34 3.53 61.89 4.09 10.9.31 18.7-2.51 24.07-7.13m-85.96 3.04a84.2 84.2 0 0 1-6.88-1.57m6.88 1.57c1.07.8 3.22 2.74 3.19 4-.03 1.59-2.4 2.81-11.17 2.91-8.76.1-14.34-2.52-14.16-7.01.04-.97.32-2.39.78-4.1m34.41-32.49c-2.46-.06-9.86-.78-14.88-.27-1.3.14-5.48 1.25-10.13 9.6a120.44 120.44 0 0 0-9.4 23.15m34.41-32.48c2.46.07 22.49 1.59 25.99 4.41 3.5 2.83-2.93 3.67-7.85 2.9-4.91-.78-11.47-1.72-18.14-7.3Zm0 0a35.32 35.32 0 0 1-8.24-8.74M51.1 92.4a82.24 82.24 0 0 0-3.67 4.45c-4.27 5.6-6.37 11-7.02 15.42-1.28 8.73 1.05 15.54 4.33 20.6M51.1 92.4c10.28-11.67 25.82-23.79 35.5-31.07 5.89-4.43 14.79-7.84 19.87-9.17 18.61-4.85 33.02-.96 43.14 10.02 3.54 3.54 6.73 8.55 6.87 14.08 0 3.1-.15 7.4-1.6 13.37M44.72 132.87c-5.27-.7-12.82-1.3-16.77 1.1C24.01 136.39 9.85 153.7 8.13 166c-1.06 7.59 5.15 7.45 10.43 8.1m136.3-84.46c-.65 6.73-2.02 20.43-2.27 21.37m0 0 12.18.2c.34-1.17 2.82-11.62 3.83-14.11a9.5 9.5 0 0 1 1.61-2.85c.63-.71 1.4-.99 2.12-1.32m-22.52 43.03c11.68-.02 24.2-.48 26.43-2.37 3.85-3.26 4.53-13.02 4.67-14.92.47-6.64.94-13.76.28-20.38a5.9 5.9 0 0 0-2.5-4.49m-28.88 42.16-2.46 22.88c4.48-.23 12.72 1.43 15.14 8.55 2.41 7.12-4.21 7.6-11.06 7.88-5.48.21-19.5.09-25.55 0m23.35-9.25c2.2.1 5.64.7 7.84 3.88 1.17 1.7.52 3.27-.62 3.94-1 .58-2.38.38-2.96.14-1.44-.57-4.87-1.1-6.22-.87-1.34.22-3.19 1.58-4.98 1.58-1.79 0-3.83-.67-4.9-2.1m41.3-78.79c-1.28.56-2.06 2.7-2.34 4.32-.27 1.63-1.23 7.95-1.32 9.48m3.66-13.8a7.28 7.28 0 0 0-2.9-1.13m0 0a9.2 9.2 0 0 0-.57-.08 5.73 5.73 0 0 0-2.9.34m3.47-.26c-1.15.4-2.14 2.47-2.57 3.82-.42 1.36-.96 3.14-2.22 10.24m1.33-13.8c-1.7 1.97-3.2 6.4-4.5 13.1"
                                        stroke="#515151"></path>
                                    <path
                                        d="M44.53 141.29c-.7-.74-2.59-7-2.67-8.77l2.67.23c1.9 3.58 6.4 7.37 8.43 8.82-2.2-.1-6.95-.28-8.43-.28Z"
                                        fill="#515151"></path>
                                    <path d="M135.3 175.44c-2.57-1.04-3.2-4.76-3-8.7-.89 2.79-4.1 6.89-6.49 8.7h9.5Z" fill="#515151">
                                    </path>
                                    <path
                                        d="M121.71 140.8c-8.99-2.04-14.92-6.8-17.57-11.67.46.39 3.28 2.57 5.93 3.8 6.86 3.17 18.16 2.8 20.05 2.8 1.23 1.47 2.88 4.85 3.52 6.3-1.1 0-6.21.06-11.93-1.23Z"
                                        fill="#515151"></path>
                                </svg></div>
                            <div class="semi-dy-open-empty-content">
                                <h4 class="semi-dy-open-typography semi-dy-open-empty-title semi-dy-open-typography-primary semi-dy-open-typography-normal semi-dy-open-typography-h4"
                                    x-semi-prop="title">暂无内容</h4>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        return filteredAccounts.map((account) => `
          <div class="flex overflow-auto relative justify-start items-center pr-4 pl-4 w-full h-10 cursor-pointer hover:bg-gray-100 menu-header-dropdown-option-item account-switch-item"
              data-appid="${account.appid}"
              data-name="${account.name}"
              data-avatar="${account.avatar}"
              ${account.appid === currentAppid ? 'style="background: rgb(234, 245, 255);"' : ''}>
            <img class="object-cover flex-shrink-0 w-6 h-6 rounded-md icon" src="${account.avatar}">
            <span class="semi-dy-open-typography description h-4 w-40 items-center leading-4 truncate ml-[6px] semi-dy-open-typography-ellipsis semi-dy-open-typography-ellipsis-single-line semi-dy-open-typography-ellipsis-overflow-ellipsis semi-dy-open-typography-ellipsis-overflow-ellipsis-text semi-dy-open-typography-primary semi-dy-open-typography-normal">
              <span>${account.name}</span>
            </span>
            <div aria-label="Tag: 小游戏" class="semi-dy-open-tag semi-dy-open-tag-default semi-dy-open-tag-square semi-dy-open-tag-light semi-dy-open-tag-white-light ml-[4px] shrink-0">
              <div class="semi-dy-open-tag-content semi-dy-open-tag-content-ellipsis">小游戏</div>
            </div>
          </div>
        `).join('');
      }

      // 绑定账号列表点击事件
      function bindAccountClickEvents() {
        popover.querySelectorAll('.account-switch-item').forEach(item => {
          item.addEventListener('click', function (e) {
            e.stopPropagation();

            const appid = this.dataset.appid;
            const name = this.dataset.name;
            const avatar = this.dataset.avatar;

            // 更新内存中的 isCurrent 状态
            accountsData.forEach(acc => {
              acc.isCurrent = (acc.appid === appid);
            });

            // 打印当前 JSON 数据
            console.log('账号数据已更新:', JSON.stringify(accountsData, null, 2));

            // 更新顶部账号信息
            const avatarEl = document.getElementById('current-account-avatar');
            const titleEl = document.getElementById('current-account-title');
            const appidEl = document.getElementById('current-account-appid');

            if (avatarEl) {
              avatarEl.src = avatar;
              avatarEl.alt = name;
            }
            if (titleEl) titleEl.textContent = name;
            if (appidEl) appidEl.textContent = 'AppID:' + appid;

            try {
              localStorage.setItem('dy_conf_current_appid', appid);
            } catch (err) { /* 隐私模式等 */ }

            console.log('切换到账号:', name, appid);

            // 立即关闭弹窗
            if (popover) {
              popover.remove();
              popover = null;
            }

            // 在右侧内容区域显示 loading 动画
            var contentArea = document.querySelector('.layoutContent-Bkg3to');
            if (contentArea) {
              var loadingOverlay = document.createElement('div');
              loadingOverlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;display:flex;justify-content:center;align-items:center;z-index:999;background:#f9f9f9;';
              loadingOverlay.innerHTML = '<div style="width:32px;height:32px;border:3px solid transparent;border-top-color:#1C5CFB;border-radius:50%;animation:spin 0.8s linear infinite;"></div><style>@keyframes spin{to{transform:rotate(360deg);}}</style>';
              contentArea.style.position = 'relative';
              contentArea.appendChild(loadingOverlay);
            }

            // 延迟刷新页面，让用户看到 loading 效果
            setTimeout(function () {
              location.reload();
            }, 500);
          });
        });
      }

      // 渲染弹窗
      function renderPopover(rect) {
        const accountsHtml = renderAccountsHtml();

        popover.innerHTML = `
          <div tabindex="-1" class="semi-dy-open-portal-inner" style="left: 21px; top: ${rect.bottom + 8}px; transform: translateX(0%) translateY(0%);">
            <div class="semi-dy-open-popover-wrapper semi-dy-open-popover-wrapper-show" role="dialog" x-placement="bottomLeft" style="animation-fill-mode: forwards;">
              <div class="semi-dy-open-tooltip-content">
                <div class="semi-dy-open-popover">
                  <div class="semi-dy-open-popover-content">
                    <div class="semi-dy-open-select-option-list-wrapper overflow-auto py-2 menu-header-dropdown-VJkUB2 menu-header-dropdown" style="min-width: 224px; width: 224px;">
                      <div class="semi-dy-open-select-dropdown-search-wrapper">
                        <div class="semi-dy-open-input-wrapper menu-header-dropdown-search semi-dy-open-input-wrapper__with-prefix semi-dy-open-input-wrapper-clearable semi-dy-open-input-wrapper-default">
                          <div class="semi-dy-open-input-prefix semi-dy-open-input-prefix-icon" x-semi-prop="prefix,insetLabel">
                            <span role="img" aria-label="search" class="semi-dy-open-icon semi-dy-open-icon-default semi-dy-open-icon-search">
                              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" focusable="false" aria-hidden="true">
                                <path fill-rule="evenodd" clip-rule="evenodd" d="M10.5 2a8.5 8.5 0 1 0 4.86 15.48l4.08 4.08a1.5 1.5 0 1 0 2.12-2.12l-4.08-4.08A8.5 8.5 0 0 0 10.5 2ZM5 10.5a5.5 5.5 0 1 1 11 0 5.5 5.5 0 0 1-11 0Z" fill="currentColor"></path>
                              </svg>
                            </span>
                          </div>
                          <input class="semi-dy-open-input semi-dy-open-input-default account-search-input" type="text" placeholder="搜索结果最多展示50个" value="">
                        </div>
                      </div>
                      <div class="semi-dy-open-select-option-list semi-dy-open-select-option-list-chosen account-list-container" role="listbox" aria-multiselectable="false" style="max-height: 270px;">
                        ${accountsHtml}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
        document.body.appendChild(popover);

        // 绑定搜索框事件
        var searchInput = popover.querySelector('.account-search-input');
        if (searchInput) {
          searchInput.addEventListener('input', function () {
            var keyword = this.value;
            var listContainer = popover.querySelector('.account-list-container');
            if (listContainer) {
              listContainer.innerHTML = renderAccountsHtml(keyword);
              bindAccountClickEvents();
            }
          });
        }

        // 绑定账号切换点击事件
        bindAccountClickEvents();
      }

      switchBtn.addEventListener('click', function (e) {
        e.stopPropagation();

        // 如果已经显示，则关闭
        if (popover) {
          popover.remove();
          popover = null;
          return;
        }

        // 获取按钮位置
        const rect = switchBtn.getBoundingClientRect();

        // 创建弹窗容器
        popover = document.createElement('div');
        popover.className = 'semi-dy-open-portal';
        popover.id = 'switch-app-popover';
        popover.style.zIndex = '1030';

        // 如果已有缓存数据，直接渲染；否则从 JSON 加载
        if (accountsData) {
          renderPopover(rect);
        } else {
          fetch('./account.json')
            .then(res => res.json())
            .then(accounts => {
              accountsData = accounts;
              console.log('初始加载账号数据:', JSON.stringify(accountsData, null, 2));
              renderPopover(rect);
            });
        }
      });

      // 点击外部关闭
      document.addEventListener('click', function (e) {
        if (popover && !popover.contains(e.target) && e.target !== switchBtn && !switchBtn.contains(e.target)) {
          popover.remove();
          popover = null;
        }
      });
    })();
  </script>
</body>
